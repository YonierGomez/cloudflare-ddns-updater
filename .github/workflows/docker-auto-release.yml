name: Docker Auto-Release Multi-Arch

on:
  schedule:
    - cron: '0 6 * * 1' # Cada lunes a las 6:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get upstream Python version
        id: upstream
        run: |
          PYTHON_VERSION=$(docker run --rm python:alpine python --version | awk '{print $2}')
          echo "version=$PYTHON_VERSION" >> "$GITHUB_OUTPUT"
          echo "Upstream Python version: $PYTHON_VERSION"

      - name: Get latest repo release
        id: current
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh release view --json tagName -q '.tagName' 2>/dev/null || echo "none")
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Current release: $LATEST"

      - name: Compare versions
        id: compare
        run: |
          UPSTREAM="v${{ steps.upstream.outputs.version }}"
          CURRENT="${{ steps.current.outputs.version }}"
          if [ "$UPSTREAM" = "$CURRENT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Versions match ($UPSTREAM), skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New version detected: $UPSTREAM (was $CURRENT)"
          fi

      - name: Set up QEMU
        if: steps.compare.outputs.skip == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.compare.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        if: steps.compare.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.USER_HUB }}
          password: ${{ secrets.PASS_HUB }}

      - name: Build and push multi-arch
        if: steps.compare.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            neytor/cloudflare-ddns-updater:latest
            neytor/cloudflare-ddns-updater:${{ steps.upstream.outputs.version }}

      - name: Fetch upstream changelog
        if: steps.compare.outputs.skip == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          CHANGELOG_URL="https://docs.python.org/release/${VERSION}/whatsnew/${MAJOR_MINOR}.html"

          # Intentar obtener título de la página de novedades
          TITLE=$(curl -sL "$CHANGELOG_URL" | grep -oP '(?<=<title>).*?(?=</title>)' | head -1 || echo "")

          if [ -z "$TITLE" ]; then
            NOTES="No se encontraron release notes específicas para Python ${VERSION}."
            NOTES="${NOTES}\n\nConsulta: https://www.python.org/downloads/"
          else
            NOTES="### Python ${VERSION}\n\n"
            NOTES="${NOTES}📄 [Release notes completas](https://docs.python.org/release/${VERSION}/whatsnew/${MAJOR_MINOR}.html)\n"
            NOTES="${NOTES}📦 [Descargas oficiales](https://www.python.org/downloads/release/python-${VERSION//./}/) "
          fi

          # Guardar en archivo para evitar problemas con caracteres especiales
          echo -e "$NOTES" > /tmp/changelog.md

      - name: Create GitHub Release
        if: steps.compare.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          TAG="v${VERSION}"

          cat > /tmp/release_body.md << 'HEADER'
          ## 🐳 cloudflare-ddns-updater

          HEADER

          cat /tmp/changelog.md >> /tmp/release_body.md

          cat >> /tmp/release_body.md << EOF

          ---

          ### Docker Tags

          \`\`\`
          docker pull neytor/cloudflare-ddns-updater:latest
          docker pull neytor/cloudflare-ddns-updater:${VERSION}
          \`\`\`

          ### Arquitecturas soportadas

          | Arquitectura | Plataforma |
          |---|---|
          | amd64 | Intel/AMD 64-bit |
          | arm64 | Apple Silicon, RPi 4+ |
          | armv7 | RPi 3, RPi 2 |

          ### Uso rápido

          \`\`\`bash
          docker run -d --name cloudflare-ddns neytor/cloudflare-ddns-updater:${VERSION}
          \`\`\`
          EOF

          gh release create "$TAG" \
            --title "Release ${TAG} (Python ${VERSION})" \
            --notes-file /tmp/release_body.md
