name: Docker Multi-Arch Auto-Release

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if Python version unchanged'
        required: false
        type: choice
        default: 'false'
        options:
          - 'true'
          - 'false'
      skip_release:
        description: 'Build and push Docker image but skip GitHub Release creation'
        required: false
        type: choice
        default: 'false'
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  # ── Phase 1: detect whether a new Python version is available ─────────────────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.upstream.outputs.version }}
      should_build: ${{ steps.compare.outputs.should_build }}

    steps:
      - name: Get upstream Python version
        id: upstream
        run: |
          PYTHON_VERSION=$(docker run --rm python:alpine python --version | awk '{print $2}')
          echo "version=$PYTHON_VERSION" >> "$GITHUB_OUTPUT"
          echo "Upstream Python version: $PYTHON_VERSION"

      - name: Get latest GitHub release tag
        id: get_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release list \
            --repo ${{ github.repository }} \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName // ""')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest release: $LATEST"

      - name: Decide whether to build
        id: compare
        run: |
          CURRENT="v${{ steps.upstream.outputs.version }}"
          LATEST="${{ steps.get_release.outputs.latest }}"
          FORCE="${{ github.event.inputs.force_build }}"
          if [[ "$CURRENT" != "$LATEST" || "$FORCE" == "true" ]]; then
            echo "should_build=true"  >> "$GITHUB_OUTPUT"
            echo "Build needed: current=$CURRENT, latest=$LATEST, force=$FORCE"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "No new version — skipping build."
          fi

  # ── Phase 2: build per-arch on native runners (no QEMU) ──────────────────────
  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Docker Login
        uses: docker/login-action@v4.0.0
        with:
          registry: docker.io
          username: ${{ secrets.USER_HUB }}
          password: ${{ secrets.PASS_HUB }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=neytor/cloudflare-ddns-updater,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Phase 3: merge digests into multi-arch manifest ──────────────────────────
  build-and-push:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Docker Login
        uses: docker/login-action@v4.0.0
        with:
          registry: docker.io
          username: ${{ secrets.USER_HUB }}
          password: ${{ secrets.PASS_HUB }}

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          docker buildx imagetools create \
            -t neytor/cloudflare-ddns-updater:latest \
            -t neytor/cloudflare-ddns-updater:${VERSION} \
            $(printf 'neytor/cloudflare-ddns-updater@sha256:%s ' $(ls /tmp/digests))

  # ── Phase 4: GitHub Release with changelog ────────────────────────────────────
  release:
    needs: [check-version, build-and-push]
    if: needs.check-version.outputs.should_build == 'true' && github.event.inputs.skip_release != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTS=$(gh release view "v${{ needs.check-version.outputs.version }}" \
            --repo ${{ github.repository }} 2>/dev/null && echo "true" || echo "false")
          echo "exists=$EXISTS" >> "$GITHUB_OUTPUT"

      - name: Fetch upstream changelog
        id: changelog
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          CHANGELOG_URL="https://docs.python.org/release/${VERSION}/whatsnew/${MAJOR_MINOR}.html"
          TITLE=$(curl -sL "$CHANGELOG_URL" | grep -oP '(?<=<title>).*?(?=</title>)' | head -1 || echo "")
          if [ -z "$TITLE" ]; then
            NOTES="See https://www.python.org/downloads/"
          else
            NOTES="[Python ${VERSION} — What's New](https://docs.python.org/release/${VERSION}/whatsnew/${MAJOR_MINOR}.html)"
          fi
          echo "$NOTES" > /tmp/changelog.md
          echo "url=$CHANGELOG_URL" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          TAG="v${VERSION}"
          NOTES=$(cat /tmp/changelog.md)

          cat > /tmp/release-notes.md << NOTES
          ## cloudflare-ddns-updater

          ### Docker Images

          \`\`\`bash
          docker pull neytor/cloudflare-ddns-updater:latest
          docker pull neytor/cloudflare-ddns-updater:${VERSION}
          \`\`\`

          ### Supported Architectures

          | Architecture | Tag |
          |---|---|
          | linux/amd64 | \`latest\`, \`${VERSION}\` |
          | linux/arm64 | \`latest\`, \`${VERSION}\` |

          ### Upstream Changelog

          ${NOTES}

          ### Quick Start

          \`\`\`bash
          docker run -d --name cloudflare-ddns neytor/cloudflare-ddns-updater:${VERSION}
          \`\`\`
          NOTES

          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Release ${TAG} (Python ${VERSION})" \
            --notes-file /tmp/release-notes.md
